<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Jacob Niu · Software</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <span class="nav-logo" id="nav-title">Jacob Niu · Software</span>
            <div class="lang-switch" role="group" aria-label="Language">
                <button type="button" class="lang-btn lang-btn-active" data-lang="zh" aria-pressed="true">中文</button>
                <button type="button" class="lang-btn" data-lang="en" aria-pressed="false">English</button>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-inner">
            <p class="hero-kicker" id="hero-kicker"></p>
            <h1 class="hero-title" id="hero-subtitle">更快、更轻、更好用的软件</h1>
        </div>
    </section>

    <div class="container">
        <main id="apps-container">
            <!-- 应用卡片将通过JavaScript动态生成 -->
        </main>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <p id="footer-text">© 2026 Jacob Niu</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
