<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛠 Jacob 的应用</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <span class="nav-logo" id="nav-title">🛠 Jacob 的应用</span>
            <div class="lang-switch" role="group" aria-label="Language">
                <button type="button" class="lang-btn lang-btn-active" data-lang="zh" aria-pressed="true">中文</button>
                <button type="button" class="lang-btn" data-lang="en" aria-pressed="false">English</button>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-inner">
            <p class="subtitle" id="hero-subtitle">更快、更轻、更好用的软件</p>
        </div>
    </section>

    <div class="container">
        <main id="apps-container">
            <!-- 应用卡片将通过JavaScript动态生成 -->
        </main>
    </div>

    <footer class="footer">
        <div class="footer-inner">
            <p id="footer-text">© 2026 设计 Jacob</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
